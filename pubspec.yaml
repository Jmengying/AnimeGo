name: anime_app
description: A cross-platform anime watching application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Network
  http: ^1.2.1

  # UI
  cached_network_image: ^3.3.1

  # Video Player (cross-platform: Windows + Android + Linux + macOS)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Local Storage
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.19.0
  volume_controller: 3.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
